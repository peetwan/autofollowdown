name: publish

# Publishes to PyPI when you create a GitHub Release (or push a v* tag).
# Uses PyPI Trusted Publishing (OIDC) — no API token to store.
# One-time setup: on https://pypi.org add a "trusted publisher" for this repo
#   (owner: peetwan, repo: autofollowdown, workflow: publish.yml, environment: pypi).

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
